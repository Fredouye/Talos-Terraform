---
# ==============================================================================
# Fetch secrets from OpenBao KV v2
# All secrets except the OpenBao token itself are stored at kv/talos-dev/config.
# Sets facts that are used by all subsequent tasks in the play.
# ==============================================================================

- name: Fetch secrets from OpenBao
  community.hashi_vault.vault_kv2_get:
    url:                "{{ bao_addr }}"
    auth_method:        token
    token:              "{{ vault_bao_token }}"
    engine_mount_point: kv
    path:               "talos-dev/config"
  register: bao_secrets
  no_log: true

- name: Set secret facts
  ansible.builtin.set_fact:
    vault_vsphere_username:  "{{ bao_secrets.secret.vsphere_username }}"
    vault_vsphere_password:  "{{ bao_secrets.secret.vsphere_password }}"
    vault_rancher_token:     "{{ bao_secrets.secret.rancher_token }}"
    vault_minio_access_key:  "{{ bao_secrets.secret.minio_access_key }}"
    vault_minio_secret_key:  "{{ bao_secrets.secret.minio_secret_key }}"
  no_log: true

#- name: Confirm secrets loaded
#  ansible.builtin.debug:
#    msg: "Secrets loaded from OpenBao at {{ bao_addr }} → kv/talos-dev/config"
